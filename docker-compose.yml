version: '3.8'

services:
  # --- KAFKA SERVICE ---
  kafka:
    image: apache/kafka:4.3.1
    container_name: kafka-ghostwriter
    ports:
      - "9092:9092"
    environment:
      # Configure Kafka as a single-node KRaft broker
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      
      # Listeners define how clients communicate with Kafka
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9094,EXTERNAL://localhost:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT'
      
      # FIX: Tells Kafka to use the INTERNAL listener for internal communication
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      
      # Log management and offsets configuration for development
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    networks:
      - app-network

  # --- POSTGRES SERVICE ---
  postgres:
    image: postgres:16
    container_name: postgres-ghostwriter
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ghost_user
      POSTGRES_PASSWORD: ghost_password
      POSTGRES_DB: ghostwriter_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

# Shared resources block
volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
